name: 🚀 Build & Release AI Terminal APK

on:
  push:
    branches: [main, master]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Build type (debug/release)'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

# Cancel in-progress runs on new push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.24.0'
  JAVA_VERSION: '17'
  APK_OUTPUT_PATH: build/app/outputs/flutter-apk

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1: Static Analysis + Tests
  # ──────────────────────────────────────────────────────────────────────────
  analyze:
    name: 🔍 Analyze & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: 🐦 Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: flutter-${{ env.FLUTTER_VERSION }}-${{ runner.os }}

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🔍 Analyze code
        run: flutter analyze --fatal-infos

      - name: 🧪 Run unit tests
        run: flutter test --coverage --reporter=github

      - name: 📊 Upload coverage report
        uses: codecov/codecov-action@v4
        if: success()
        with:
          file: coverage/lcov.info
          fail_ci_if_error: false

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2: Build Debug APK (on PR)
  # ──────────────────────────────────────────────────────────────────────────
  build-debug:
    name: 🔨 Build Debug APK
    runs-on: ubuntu-latest
    needs: analyze
    if: github.event_name == 'pull_request'
    timeout-minutes: 40

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🔨 Build Debug APK
        run: flutter build apk --debug --split-per-abi

      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apks-${{ github.sha }}
          path: ${{ env.APK_OUTPUT_PATH }}/*.apk
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3: Build Release APK (on push to main / tag)
  # ──────────────────────────────────────────────────────────────────────────
  build-release:
    name: 📦 Build Release APK
    runs-on: ubuntu-latest
    needs: analyze
    if: |
      github.event_name == 'push' && 
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || 
       startsWith(github.ref, 'refs/tags/v'))
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: flutter-${{ env.FLUTTER_VERSION }}-${{ runner.os }}

      - name: 📦 Restore pub cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: 📦 Get dependencies
        run: flutter pub get

      # ── Keystore Setup ────────────────────────────────────────────────────
      - name: 🔑 Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
          echo "KEYSTORE_EXISTS=true" >> $GITHUB_ENV

      - name: 🔑 Create key.properties
        if: env.KEYSTORE_EXISTS == 'true'
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.jks
          EOF

      # ── Version Bump ──────────────────────────────────────────────────────
      - name: 📝 Get version from tag
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(grep '^version:' pubspec.yaml | cut -d ' ' -f2 | cut -d '+' -f1)
          fi
          BUILD_NUMBER=${{ github.run_number }}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "Version: $VERSION+$BUILD_NUMBER"

      # ── Build APKs ────────────────────────────────────────────────────────
      - name: 🔨 Build Release APK (split per ABI)
        run: |
          flutter build apk \
            --release \
            --split-per-abi \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ steps.version.outputs.build_number }} \
            --obfuscate \
            --split-debug-info=build/debug-info
        env:
          FLUTTER_BUILD_MODE: release

      - name: 🔨 Build Universal APK
        run: |
          flutter build apk \
            --release \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ steps.version.outputs.build_number }}

      # ── Rename APKs ───────────────────────────────────────────────────────
      - name: 📝 Rename APKs
        run: |
          VERSION=${{ steps.version.outputs.version }}
          BUILD=${{ steps.version.outputs.build_number }}
          cd ${{ env.APK_OUTPUT_PATH }}
          
          for apk in *.apk; do
            if [[ $apk == *"arm64-v8a"* ]]; then
              mv "$apk" "ai-terminal-${VERSION}+${BUILD}-arm64.apk"
            elif [[ $apk == *"armeabi-v7a"* ]]; then
              mv "$apk" "ai-terminal-${VERSION}+${BUILD}-arm32.apk"
            elif [[ $apk == *"x86_64"* ]]; then
              mv "$apk" "ai-terminal-${VERSION}+${BUILD}-x86_64.apk"
            else
              mv "$apk" "ai-terminal-${VERSION}+${BUILD}-universal.apk"
            fi
          done
          ls -lh

      # ── Upload Artifacts ──────────────────────────────────────────────────
      - name: 📤 Upload Release APKs
        uses: actions/upload-artifact@v4
        with:
          name: release-apks-v${{ steps.version.outputs.version }}
          path: ${{ env.APK_OUTPUT_PATH }}/*.apk
          retention-days: 30

      - name: 📤 Upload Debug Symbols
        uses: actions/upload-artifact@v4
        with:
          name: debug-symbols-v${{ steps.version.outputs.version }}
          path: build/debug-info/
          retention-days: 30

      # ── Generate Checksums ────────────────────────────────────────────────
      - name: 🔐 Generate SHA256 checksums
        run: |
          cd ${{ env.APK_OUTPUT_PATH }}
          sha256sum *.apk > checksums.sha256
          cat checksums.sha256

      - name: 📤 Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums-v${{ steps.version.outputs.version }}
          path: ${{ env.APK_OUTPUT_PATH }}/checksums.sha256

    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 4: GitHub Release (on version tag only)
  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: 🎉 Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📥 Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-apks-v${{ needs.build-release.outputs.version }}
          path: release-apks/

      - name: 📥 Download checksums
        uses: actions/download-artifact@v4
        with:
          name: checksums-v${{ needs.build-release.outputs.version }}
          path: release-apks/

      - name: 📝 Generate Release Notes
        id: release_notes
        run: |
          VERSION=${{ needs.build-release.outputs.version }}
          BUILD=${{ needs.build-release.outputs.build_number }}
          
          cat > notes.md << 'EOF'
          ## 🤖 AI Terminal Controller v${VERSION}
          
          ### 📱 Downloads
          | File | Architecture | Description |
          |------|-------------|-------------|
          | `ai-terminal-*-arm64.apk` | ARM64 | Most modern Android phones |
          | `ai-terminal-*-arm32.apk` | ARM32 | Older Android phones |
          | `ai-terminal-*-x86_64.apk` | x86_64 | Emulators / Intel phones |
          | `ai-terminal-*-universal.apk` | Universal | Works on all devices |
          
          ### ✨ Features
          - 🤖 Multi-provider AI support (OpenAI, Anthropic, Gemini, Groq, Ollama)
          - 📁 File picker & workspace management
          - 💻 Termux integration for running shell commands
          - 🎨 Code syntax highlighting in chat
          - 🔄 Streaming responses
          
          ### ⚠️ Installation
          1. Enable "Install unknown apps" in Android settings
          2. Download the APK for your device architecture (arm64 recommended)
          3. Install and grant storage & notification permissions
          
          ### 🔐 Verify Download
          Check `checksums.sha256` to verify file integrity.
          EOF
          echo "notes_file=notes.md" >> $GITHUB_OUTPUT

      - name: 🎉 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AI Terminal v${{ needs.build-release.outputs.version }}"
          body_path: notes.md
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          files: |
            release-apks/*.apk
            release-apks/checksums.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 5: Notify on Failure
  # ──────────────────────────────────────────────────────────────────────────
  notify-failure:
    name: 📣 Notify on Failure
    runs-on: ubuntu-latest
    needs: [analyze, build-release]
    if: failure()

    steps:
      - name: 📣 Send failure notification
        run: |
          echo "❌ Build FAILED for ${{ github.ref }} (commit: ${{ github.sha }})"
          echo "Check workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
