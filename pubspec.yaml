name: flutter_ai_terminal
description: AI Terminal Controller - Multi-provider AI chat with Termux integration
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  dio: ^5.4.3
  file_picker: ^8.0.3
  android_intent_plus: ^4.0.3
  flutter_markdown: ^0.7.1
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  path: ^1.9.0
  path_provider: ^2.1.3
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
