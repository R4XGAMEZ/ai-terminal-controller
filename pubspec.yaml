name: ai_terminal_controller
description: AI-powered terminal controller with Termux integration.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.3

  # File Management
  file_picker: ^8.0.3
  path_provider: ^2.1.3
  path: ^1.9.0
  permission_handler: ^11.3.1

  # Storage & State
  shared_preferences: ^2.2.3
  provider: ^6.1.2
  flutter_riverpod: ^2.5.1

  # UI Components
  flutter_markdown: ^0.6.22
  highlight: ^0.7.0
  flutter_highlight: ^0.7.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  shimmer: ^3.0.0

  # Android Intent (Termux integration)
  android_intent_plus: ^4.0.3
  flutter_local_notifications: ^17.2.1+2

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  clipboard: ^0.1.3
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/animations/
  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
